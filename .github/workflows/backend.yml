name: Backend - Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - "finance-api/**"
      - ".github/workflows/backend.yml"
  pull_request:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 26
  PNPM_VERSION: 11.13.0

jobs:
  fmt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finance-api
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo fmt --check

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finance-api
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: finance-api/package-lock.json

      - run: pnpm install --frozen-lockfile
      - run: pnpm wrangler build

      - uses: actions/upload-artifact@v7
        with:
          name: finance-api
          path: finance-api/target

  build-openapi:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finance-api
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - run: cargo openapi > openapi.json

      - uses: actions/upload-artifact@v7
        with:
          name: openapi
          path: openapi.json

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finance-api
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/download-artifact@v8
        with:
          name: finance-api
          path: finance-api/target

      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: finance-api
